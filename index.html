<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JAF Logistics — Premium Global Freight & Supply Chain</title>
    
    <!-- Preconnect to Google Fonts to speed up font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Preconnect to API server (saves ~320ms on LCP) -->
    <link rel="preconnect" href="https://api.jafdemenagements.com">

    <!-- Preload critical Hero Image for LCP -->
    <link rel="preload" as="image" href="/src/assets/hero-air.webp" type="image/webp" fetchpriority="high" />
    
    <!-- Load Google Fonts without blocking render (only weights actually used) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Outfit:wght@700;800;900&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Outfit:wght@700;800;900&display=swap"></noscript>
    <link rel="icon" type="image/webp" href="/brand/jaf-logo.webp" />
    <meta name="description" content="JAF Logistics delivers world-class air, sea, and road freight services. Reliable, transparent global shipping solutions."/>
    <meta name="author" content="JAF Logistics" />
    <meta property="og:title" content="JAF Logistics — Global Freight Solutions" />
    <meta property="og:description" content="Premium air, sea, and road freight services worldwide." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/brand/jaf-logo.webp" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@JAFLogistics" />
    <meta name="twitter:image" content="/brand/jaf-logo.webp" />
  </head>
  <body>
    <div id="root">
      <div style="position:relative;width:100%;height:100vh;overflow:hidden;background-color:#000;">
        <img src="/src/assets/hero-air.webp" alt="Loading" style="width:100%;height:100%;object-fit:cover;transform:scale(1.1);" fetchpriority="high" />
        <div style="position:absolute;inset:0;background:linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.55) 40%, rgba(0,0,0,0.18) 75%, transparent 100%);"></div>
        <div style="position:absolute;inset:0;background:linear-gradient(to right, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.3) 50%, transparent 100%);"></div>
        <div style="position:absolute;left:0;right:0;top:0;height:160px;background:linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);z-index:5;"></div>
      </div>
    </div>
    <noscript>This website requires JavaScript to run properly.</noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
